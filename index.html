<!DOCTYPE html>
<html>
<head>
<title>MindEase – Smart Wellness Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #1e1e2f;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: none;
  color: white;
  border: none;
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
}

.sidebar button:hover {
  background: #33334d;
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
}

/* SECTION */
.section {
  display: none;
}

.active {
  display: block;
}

/* CARD */
.card {
  background: white;
  padding: 25px;
  margin: 20px auto;
  width: 450px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

/* INPUT */
input, select {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}

/* BUTTON */
button.primary {
  background: #667eea;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
}

/* TEXT */
.highlight {
  font-weight: bold;
  color: #667eea;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>MindEase</h2>

  <button onclick="showSection('home')">🏠 Home</button>
  <button onclick="showSection('checkin')">Check-In</button>
  <button onclick="showSection('history')">📊 Analytics</button>
  <button onclick="showSection('study')">📚 Study Plan</button>
  <button onclick="showSection('support')">📞 Support</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h1 id="welcomeText">Welcome to Student Stress Relief Kit</h1>

    <p>
      “Your mental health is an investment, not an expense.”
    </p>

    <p>
      Track your stress, understand patterns, and take action.
    </p>
  </div>
</div>

<!-- LOGIN + CHECK-IN -->
<div id="checkin" class="section">
  <div class="card">

    <h2>Login</h2>
    <input type="text" id="name" placeholder="Enter your name">

    <h3>Stress Check-In</h3>

    <select id="reason">
      <option value="exam">Exams</option>
      <option value="pressure">Academic Pressure</option>
      <option value="time">Time Management </option>
      <option value="personal">Personal or Family issues </option>
    </select>

    <select id="frequency">
      <option value="3">Very Often</option>
      <option value="2">Sometimes</option>
      <option value="1">Rarely</option>
    </select>

    <select id="sleep">
      <option value="3">Poor Sleep</option>
      <option value="2">Average Sleep</option>
      <option value="1">Good Sleep</option>
    </select>

    <button class="primary" onclick="analyze()">Analyze</button>

    <div id="result" style="display:none;">
      <p id="output"></p>
      <p id="insight" class="highlight"></p>

      <canvas id="stressChart"></canvas>
    </div>

  </div>
</div>

<!-- ANALYTICS -->
<div id="history" class="section">
  <div class="card">
    <h2>Stress Analytics</h2>
    <canvas id="historyChart"></canvas>

    <p id="trendText"></p>
  </div>
</div>

<!-- STUDY -->
<div id="study" class="section">
  <div class="card">
    <h2>Personalized Study Plan</h2>
    <p id="studyPlan"></p>
  </div>
</div>

<!-- SUPPORT -->
<div id="support" class="section">
  <div class="card">
    <h2>Support</h2>

    <p>📞 Helpline: 9152987821</p>

    <a href="https://forms.gle/r2ByWGVgDnxsgugj8" target="_blank">
      <button class="primary">Talk to Someone</button>
    </a>
  </div>
</div>

</div>

<script>

function showSection(id) {
  document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ANALYZE FUNCTION
function analyze() {
  let name = document.getElementById("name").value;
  let frequency = parseInt(document.getElementById("frequency").value);
  let sleep = parseInt(document.getElementById("sleep").value);
  let reason = document.getElementById("reason").value;

  if(name === "") {
    alert("Enter name");
    return;
  }

  let score = frequency + sleep;

  let result = score >= 5 ? "High stress detected" : "Moderate stress";

  // SMART INSIGHT
  let insight = score >= 5 ? 
    "Your stress is consistently high. Consider structured breaks." :
    "Your stress is manageable but monitor it regularly.";

  // STUDY PLAN
  let plan = "";
  if(reason === "exam") plan = "Use Pomodoro + revision cycles";
  else if(reason === "time") plan = "Plan your day with priorities";
  else plan = "Focus on one task at a time";

  document.getElementById("result").style.display = "block";
  document.getElementById("output").innerText = result;
  document.getElementById("insight").innerText = insight;
  document.getElementById("studyPlan").innerText = plan;

  document.getElementById("welcomeText").innerText =
    "Welcome " + name;

  // CHART
  new Chart(document.getElementById("stressChart"), {
    type: 'bar',
    data: {
      labels: ["Stress Score"],
      datasets: [{ data: [score] }]
    }
  });

  // SAVE HISTORY
  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.push({ score: score });

  localStorage.setItem("history", JSON.stringify(history));

  loadHistory();
}

// HISTORY
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];

  let data = history.map(h => h.score);

  new Chart(document.getElementById("historyChart"), {
    type: 'line',
    data: {
      labels: data.map((_, i) => "Attempt " + (i+1)),
      datasets: [{ label: "Stress Trend", data: data }]
    }
  });

  // TREND DETECTION
  if(data.length >= 2) {
    let trend = data[data.length-1] > data[0] ?
      "⚠️ Stress increasing over time" :
      "✅ Stress improving";

    document.getElementById("trendText").innerText = trend;
  }
}

loadHistory();

</script>

</body>
</html>
