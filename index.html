<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stress Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Stress Analyzer</h1>
  <p>Let’s understand how you’re feeling today</p>

  <button onclick="startSurvey()">Start Check-In</button>

  <div id="survey" class="card" style="display:none;">
  <h2>Stress Check-In</h2>

  <p>Stress Level (1–10)</p>
  <input type="range" min="1" max="10" id="stressLevel">

  <p>How well are you sleeping?</p>
  <select id="sleep">
    <option value="1">Poor</option>
    <option value="2">Average</option>
    <option value="3">Good</option>
  </select>

  <p>Difficulty concentrating?</p>
  <select id="focus">
    <option value="3">High</option>
    <option value="2">Medium</option>
    <option value="1">Low</option>
  </select>

  <p>Main Stress Reason</p>
  <select id="reason">
    <option value="exam">Exams</option>
    <option value="pressure">Pressure</option>
    <option value="time">Time Issues</option>
    <option value="personal">Personal</option>
  </select>

  <br><br>
  <button onclick="analyze()">Analyze</button>
</div>

 <div id="result" class="card" style="display:none;">
  <h2>Your Stress Report</h2>

  <div class="meter">
    <div id="stressBar"></div>
  </div>

  <p id="scoreText"></p>

  <p id="output"></p>

  <h3>Recommended Video</h3>
  <iframe id="videoFrame" width="300" height="200"></iframe>

  <br><br>
  <button onclick="restart()">Start Again</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
