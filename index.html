<!DOCTYPE html>
<html>
<head>
<title>Student Stress Relief Kit Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #1e1e2f;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: none;
  color: white;
  border: none;
  text-align: left;
  cursor: pointer;
}

.sidebar button:hover {
  background: #33334d;
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
  background: #f4f4f4;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}

/* BUTTON */
button.primary {
  background: #667eea;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* SECTIONS */
.section {
  display: none;
}

.active {
  display: block;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Student Stress Relief Kit</h2>

  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('checkin')"> Check-In</button>
  <button onclick="showSection('study')"> Study Plan</button>
  <button onclick="showSection('history')"> History</button>
  <button onclick="showSection('support')">📞 Support</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">
  <h1>Welcome</h1>
  <p>Your mental wellness dashboard</p>

  <div class="card">
    <p>“Small steps every day lead to big changes.”</p>
  </div>
</div>

<!-- CHECK-IN -->
<div id="checkin" class="section">
  <h2>Stress Check-In</h2>

  <div class="card">
    <select id="reason">
      <option value="exam">Exams</option>
      <option value="pressure">Pressure</option>
      <option value="time">Time Issues</option>
      <option value="personal">Personal</option>
    </select>

    <select id="frequency">
      <option value="3">Very Often</option>
      <option value="2">Sometimes</option>
      <option value="1">Rarely</option>
    </select>

    <select id="sleep">
      <option value="3">Poor</option>
      <option value="2">Average</option>
      <option value="1">Good</option>
    </select>

    <br><br>
    <button class="primary" onclick="analyze()">Analyze</button>
  </div>

  <div id="result" class="card" style="display:none;">
    <h3>Your Result</h3>
    <p id="output"></p>

    <canvas id="stressChart"></canvas>

    <iframe id="videoFrame" width="300" height="200"></iframe>
  </div>
</div>

<!-- STUDY -->
<div id="study" class="section">
  <h2>Study Plan</h2>

  <div class="card">
    <p>
      ~ Use Pomodoro Technique<br>
      ~ Plan your day<br>
      ~ Focus on one task at a time
    </p>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
  <h2>History</h2>

  <div class="card">
    <ul id="historyList"></ul>
  </div>
</div>

<!-- SUPPORT -->
<div id="support" class="section">
  <h2>Support</h2>

  <div class="card">
    <p>📞 Helpline: 9152987821</p>

    <a href="https://forms.gle/r2ByWGVgDnxsgugj8" target="_blank">
      <button class="primary">Reach Out</button>
    </a>
  </div>
</div>

</div>

<script>

function showSection(id) {
  let sections = document.querySelectorAll('.section');
  sections.forEach(sec => sec.classList.remove('active'));

  document.getElementById(id).classList.add('active');
}

// LOAD HISTORY
function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let list = document.getElementById("historyList");

  list.innerHTML = "";

  history.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.date + " - " + item.result;
    list.appendChild(li);
  });
}

function analyze() {
  let reason = document.getElementById("reason").value;
  let frequency = parseInt(document.getElementById("frequency").value);
  let sleep = parseInt(document.getElementById("sleep").value);

  let score = frequency + sleep;
  let result = "";
  let video = "";

  if(score >= 5) {
    result = "🔴 High stress detected";
  } else {
    result = "🟡 Moderate stress";
  }

  if(reason === "exam") {
    video = "https://www.youtube.com/embed/IlU-zDU6aQ0";
  } else {
    video = "https://www.youtube.com/embed/odADwWzHR24";
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("output").innerText = result;
  document.getElementById("videoFrame").src = video;

  // CHART
  new Chart(document.getElementById("stressChart"), {
    type: 'bar',
    data: {
      labels: ["Stress Score"],
      datasets: [{
        label: "Your Score",
        data: [score]
      }]
    }
  });

  // SAVE HISTORY
  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.push({
    score: score,
    result: result,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("history", JSON.stringify(history));

  loadHistory();
}

// LOAD ON START
loadHistory();

</script>

</body>
</html>
