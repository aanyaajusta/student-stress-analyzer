<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stress Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Stress Analyzer</h1>
  <p>Let’s understand how you’re feeling today</p>

  <button onclick="startSurvey()">Start Check-In</button>

  <div id="survey" class="card" style="display:none;">
    <h2>Step 1: Stress Level</h2>
    <input type="range" min="1" max="10" id="stressLevel">
    <p>Select your stress level (1–10)</p>

    <h2>Step 2: Main Reason</h2>
    <select id="reason">
      <option value="exam">Exams</option>
      <option value="pressure">Performance Pressure</option>
      <option value="time">Time Management</option>
      <option value="personal">Personal Issues</option>
    </select>

    <br><br>
    <button onclick="analyze()">Analyze</button>
  </div>

  <div id="result" class="card" style="display:none;">
    <h2>Your Stress Report</h2>
    <p id="output"></p>

    <h3>Recommended Video</h3>
    <iframe width="300" height="200"
      src="https://www.youtube.com/embed/odADwWzHR24">
    </iframe>

    <br><br>
    <button onclick="restart()">Start Again</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
